syntax = "proto3";

option java_multiple_files = true;
option java_package = "at.ourproject.register";
option java_outer_classname = "RegisterEegProto";
option go_package = "at.ourproject/vfeeg-backend/proto";

package at.ourproject;

// The EEG service definition.
service RegisterEegService {
  rpc register (RegisterEegRequest) returns (RegisteredEegReply) {}
  rpc eegExists (EegRequest) returns (EegResponse) {}
  //  rpc updateEeg (UpdateEegRequest) returns (EegResponse) {}
}

message EegRequest {
  string rcNumber = 1;
}

message EegResponse {
  bool exists = 1;
}

// The request message containing the user's name.
message RegisterEegRequest {
  enum EEG_LEGAL{
    verein = 0;
    genossenschaft = 1;
    gesellschaft = 2;
  }

  enum EEG_SETTELMENT {
    ANNUAL = 0;
    BIANNUAL = 1;
    QUARTER = 2;
    MONTHLY = 3;
  }

  enum GRID_AREA {
    REGIONAL = 0;
    LOCAL = 1;
    BEG = 2;
    GEA = 3;
  }

  enum GRID_ALLOCATION {
    DYNAMIC = 0;
    STATIC = 1;
  }

  string tenant = 1;
  string rcNumber = 2;
  string communityId = 3;
  string name = 4;
  string description = 5;
  string iban = 6;
  string owner = 7;
  bool sepa = 8;
  EEG_LEGAL legal = 9;
  EEG_SETTELMENT settelmentInterval = 10;
  string gridId = 11;
  string gridName = 12;
  GRID_AREA area = 13;
  GRID_ALLOCATION allocation = 14;
  string eegOwner = 15;
  string street = 16;
  string streetNumber = 17;
  string city = 18;
  string zip = 19;
  string email = 20;
  optional string web = 21;
  optional string phone = 22;
  bool online = 23;
}

// The response message containing the greetings
message RegisteredEegReply {
  uint32 status = 1;
}