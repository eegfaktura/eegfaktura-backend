# Stage 1 (build-only) fuer eegfaktura-master — das prod-Backend
# (go.mod-Modul at.ourproject/vfeeg-backend, Binary `vfeeg-backend`).
#
# Baut den selbst-enthaltenen Dockerfile (Go 1.25 + protoc + go generate).
# PR-Events bauen nur (kein Push, fork-sicher); Push auf den Default-Branch
# baut + pusht nach ghcr.io/<repo>.
#
# Bewusst NICHT dabei (spaetere Stufen):
#   - dispatch-deploy zum Platform-Repo (Stage 3)
#   - Push ins Development-Tier vfeeg-development/vfeeg-backend (Migration,
#     braucht VFEEG_DEV_PUSH_PAT + Naming-Mapping wie bei eda-xp/kep)

name: Docker Image CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title="eegfaktura-master"
            org.opencontainers.image.description="VFEEG Master Backend (vfeeg-backend) — EDA/MQTT, GraphQL, billing master data"
            org.opencontainers.image.source=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.url=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.version=${{ github.sha || '' }}
            org.opencontainers.image.revision=${{ github.sha || '' }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || '' }}
            org.opencontainers.image.authors="eegfaktura@vfeeg.org"
            org.opencontainers.image.vendor="Verein zur Förderung von Erneuerbaren Energiegemeinschaften"
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id || '' }}
            org.opencontainers.image.revision.sha=${{ github.sha || '' }}
            org.opencontainers.image.repository=${{ github.repository || '' }}
            org.opencontainers.image.repository.url=${{ github.event.repository.html_url || '' }}

      - name: Login to Container Registry
        # Nur bei push-Events anmelden — PRs (auch aus Forks) duerfen nicht pushen.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) / Build and push (push)
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags || 'latest' }}
          labels: ${{ steps.meta.outputs.labels || '' }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Generate artifact attestation
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
